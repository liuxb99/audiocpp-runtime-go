<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:20px;font-weight:600}
.status-bar{background:#e8e8e8;padding:8px 24px;font-size:13px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.status-bar .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-bar .dot.green{background:#22c55e}
.status-bar .dot.gray{background:#9ca3af}
.status-bar .actions{margin-left:auto;display:flex;gap:8px}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:transparent;border:1px solid #d1d5db;color:#374151}
.btn-outline:hover{background:#f3f4f6}
.container{max-width:1200px;margin:0 auto;padding:24px;display:flex;gap:24px;flex-wrap:wrap}
.sidebar{flex:0 0 280px}
.main{flex:1;min-width:0}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px;color:#1a1a2e}
.model-list{max-height:500px;overflow-y:auto}
.model-item{padding:10px 12px;border-radius:6px;cursor:pointer;transition:background .1s;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.model-item:hover{background:#f0f4ff}
.model-item.active{background:#dbeafe;border-left:3px solid #3b82f6}
.model-item .name{flex:1;font-size:13px}
.model-item .status{font-size:11px;color:#6b7280}
.model-item .not-installed{color:#ef4444;font-size:11px}
.model-item .badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#e5e7eb;color:#4b5563}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;background:#e5e7eb;color:#4b5563;transition:all .15s;border:none}
.tab:hover{background:#d1d5db}
.tab.active{background:#3b82f6;color:#fff}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:#374151}
.form-group textarea,.form-group input[type="text"],.form-group select{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
.form-group textarea{min-height:80px;resize:vertical;font-family:inherit}
.form-group input[type="file"]{width:100%;padding:8px;font-size:13px}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-row>*{flex:1;min-width:120px}
.audio-player{width:100%;margin-top:8px}
.result-area{margin-top:12px;padding:12px;background:#f9fafb;border-radius:6px;font-size:13px}
#model-hint{font-size:12px;color:#6b7280;padding:8px 12px;background:#f0fdf4;border-radius:6px;margin-bottom:12px}
.loading{opacity:.6;pointer-events:none}
@media(max-width:768px){.sidebar{flex:0 0 100%}.container{flex-direction:column}}
</style>
</head>
<body>
<div class="header">
  <h1>audio.cpp Runtime</h1>
  <span style="font-size:13px;opacity:.7">Go Runtime v0.1</span>
  <span style="margin-left:auto;font-size:13px">
    <a href="?lang=en" style="color:#93c5fd;text-decoration:none">EN</a>
    <span style="color:#6b7280">|</span>
    <a href="?lang=zh" style="color:#93c5fd;text-decoration:none">中文</a>
  </span>
</div>

<div class="status-bar" id="status-bar">
  <span id="server-status" class="dot gray"></span>
  <span id="status-text">{{t "连接中..." "Connecting..."}}</span>
  <div class="actions">
    <button class="btn btn-outline" onclick="refreshStatus()">{{t "刷新" "Refresh"}}</button>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="card">
      <h2>{{t "模型列表" "Models"}}</h2>
      <div class="model-list" id="model-list">
        {{range .Models}}
        <div class="model-item {{if not .Installed}}not-installed{{end}}" data-id="{{.ID}}" data-family="{{.Family}}" data-task="{{.Task}}" onclick="selectModel(this)">
          <span class="name">{{.Label}}</span>
          <span class="badge">{{.Task}}</span>
        </div>
        {{end}}
      </div>
    </div>

    <div class="card">
      <h2>{{t "模型管理" "Model Mgmt"}}</h2>
      <div class="form-group">
        <button class="btn btn-primary" style="width:100%" onclick="loadModel()">{{t "加载模型" "Load Model"}}</button>
      </div>
      <div class="form-group">
        <button class="btn btn-danger" style="width:100%" onclick="unloadModel()">{{t "卸载模型" "Unload Model"}}</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <div class="tabs" id="task-tabs">
        {{range .Tabs}}
        <button class="tab" data-tab="{{.ID}}" onclick="switchTab('{{.ID}}')">{{.Label}}</button>
        {{end}}
      </div>
      <div id="tab-content">
        {{t "请选择一个模型并加载。" "Select a model and click Load."}}
      </div>
    </div>
  </div>
</div>

<script>
let selectedModelId = "";
let selectedModelFamily = "";
let selectedModelTask = "";
let currentTab = "tts";

function selectModel(el) {
  document.querySelectorAll('.model-item').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
  selectedModelId = el.dataset.id;
  selectedModelFamily = el.dataset.family;
  selectedModelTask = el.dataset.task;
  document.getElementById('tab-content').innerHTML = '{{t "模型已选择：" "Selected: "}}' + selectedModelId;
  renderTabContent(currentTab);
}

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="'+tabId+'"]').classList.add('active');
  renderTabContent(tabId);
}

function renderTabContent(tabId) {
  const el = document.getElementById('tab-content');
  switch(tabId) {
    case 'tts': renderTTS(el); break;
    case 'asr': renderASR(el); break;
    case 'vc': renderVC(el); break;
    case 'gen': renderGen(el); break;
    case 'sep': renderSep(el); break;
    case 'analyze': renderAnalyze(el); break;
    case 'vdes': renderVdes(el); break;
  }
}

function renderTTS(el) {
  el.innerHTML = '<div id="model-hint"></div>' +
    '<div class="form-group"><label>{{t "合成文本" "Text"}}</label><textarea id="tts-text" rows="4" placeholder="{{t "输入要合成的文字..." "Enter text to synthesize..."}}"></textarea></div>' +
    '<div class="form-row">' +
    '<div class="form-group"><label>{{t "语言" "Language"}}</label><select id="tts-lang"><option value="">{{t "自动" "Auto"}}</option><option value="english">English</option><option value="chinese">中文</option><option value="japanese">日本語</option></select></div>' +
    '<div class="form-group"><label>Seed</label><input type="text" id="tts-seed" value="-1"></div>' +
    '</div>' +
    '<div class="form-group"><label>{{t "参考音频" "Voice Ref"}}</label><input type="file" id="tts-voice-ref" accept="audio/*"></div>' +
    '<div class="form-group"><label>{{t "参考文本" "Reference Text"}}</label><textarea id="tts-ref-text" rows="2" placeholder="{{t "参考音频的原文" "Transcript of the reference audio"}}"></textarea></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doTTS()">{{t "生成语音" "Generate"}}</button></div>' +
    '<div id="tts-result"></div>';
  updateHint();
}

function renderASR(el) {
  el.innerHTML = '<div class="form-group"><label>{{t "上传音频" "Upload Audio"}}</label><input type="file" id="asr-audio" accept="audio/*"></div>' +
    '<div class="form-row"><div class="form-group"><label>{{t "语种" "Language"}}</label><select id="asr-lang"><option value="">{{t "自动" "Auto"}}</option><option value="Chinese">中文</option><option value="English">English</option></select></div></div>' +
    '<div class="form-group"><label>{{t "上下文" "Context"}}</label><textarea id="asr-context" rows="2" placeholder="{{t "可选：人名、术语" "Optional: names, terms"}}"></textarea></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doASR()">{{t "转写文字" "Transcribe"}}</button></div>' +
    '<div id="asr-result"></div>';
}

function renderVC(el) {
  el.innerHTML = '<div class="form-group"><label>{{t "源音频" "Source Audio"}}</label><input type="file" id="vc-source" accept="audio/*"></div>' +
    '<div class="form-group"><label>{{t "目标音色" "Target Voice"}}</label><input type="file" id="vc-target" accept="audio/*"></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doVC()">{{t "转换声音" "Convert"}}</button></div>' +
    '<div id="vc-result"></div>';
}

function renderGen(el) {
  el.innerHTML = '<div class="form-group"><label>{{t "提示词" "Prompt"}}</label><textarea id="gen-prompt" rows="3" placeholder="{{t "描述音乐或音效..." "Describe music or sound..."}}"></textarea></div>' +
    '<div class="form-row"><div class="form-group"><label>{{t "时长(秒)" "Duration(s)"}}</label><input type="text" id="gen-duration" value="30"></div></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doGen()">{{t "生成音乐" "Generate"}}</button></div>' +
    '<div id="gen-result"></div>';
}

function renderSep(el) {
  el.innerHTML = '<div class="form-group"><label>{{t "上传音频" "Upload Audio"}}</label><input type="file" id="sep-audio" accept="audio/*"></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doSep()">{{t "分离音轨" "Separate"}}</button></div>' +
    '<div id="sep-result"></div>';
}

function renderAnalyze(el) {
  el.innerHTML = '<div class="form-group"><label>{{t "上传音频" "Upload Audio"}}</label><input type="file" id="analyze-audio" accept="audio/*"></div>' +
    '<div class="form-group"><select id="analyze-type"><option value="vad">{{t "VAD" "VAD"}}</option><option value="diar">{{t "说话人分离" "Diarization"}}</option><option value="align">{{t "强制对齐" "Alignment"}}</option></select></div>' +
    '<div class="form-group" id="align-text-group" style="display:none"><label>{{t "对齐文本" "Alignment Text"}}</label><textarea id="align-text" rows="3"></textarea></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doAnalyze()">{{t "分析" "Analyze"}}</button></div>' +
    '<div id="analyze-result"></div>';
  setTimeout(function(){
    var sel = document.getElementById('analyze-type');
    if(sel) sel.addEventListener('change',function(){document.getElementById('align-text-group').style.display=this.value==='align'?'block':'none';});
  }, 100);
}

function renderVdes(el) {
  el.innerHTML = '<div class="form-group"><label>{{t "音色描述" "Voice Description"}}</label><textarea id="vdes-desc" rows="3" placeholder="{{t "描述想要的声音..." "Describe the voice..."}}"></textarea></div>' +
    '<div class="form-group"><label>{{t "合成文本" "Text"}}</label><textarea id="vdes-text" rows="3"></textarea></div>' +
    '<div class="form-group"><button class="btn btn-primary" onclick="doVdes()">{{t "生成" "Generate"}}</button></div>' +
    '<div id="vdes-result"></div>';
}

async function refreshStatus() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    const dot = document.getElementById('server-status');
    const text = document.getElementById('status-text');
    if (data.alive) {
      dot.className = 'dot green';
      text.textContent = '{{t "已连接" "Connected"}} - ' + data.backend + ' - ' + (data.model_id||'{{t "无模型" "no model"}}');
    } else {
      dot.className = 'dot gray';
      text.textContent = '{{t "未连接" "Not connected"}}';
    }
  } catch(e) {
    document.getElementById('server-status').className = 'dot gray';
    document.getElementById('status-text').textContent = '{{t "连接失败" "Connection failed"}}';
  }
}

async function loadModel() {
  if (!selectedModelId) { alert('{{t "先选模型" "Select a model first"}}'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.classList.add('loading');
  try {
    const r = await fetch('/api/load', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model_id:selectedModelId})});
    const data = await r.json();
    if (r.ok) { refreshStatus(); renderTabContent(currentTab); }
    else { alert('{{t "加载失败" "Load failed"}}: '+ (data.error||data.status)); }
  } catch(e) { alert('{{t "请求失败" "Request failed"}}: '+e); }
  btn.classList.remove('loading');
}

async function unloadModel() {
  await fetch('/api/unload', {method:'POST'});
  refreshStatus();
}

function updateHint() {
  const el = document.getElementById('model-hint');
  if (!el) return;
  el.textContent = selectedModelId ? '{{t "模型已选择： " "Model selected: "}}'+selectedModelId : '{{t "请选择模型" "Select a model"}}';
}

async function apiCall(endpoint, body, resultId) {
  const resultEl = document.getElementById(resultId);
  resultEl.innerHTML = '{{t "处理中..." "Processing..."}}';
  const btn = document.querySelector('.btn-primary');
  btn.classList.add('loading');
  try {
    const r = await fetch('{{.ServerURL}}'+endpoint, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const ct = r.headers.get('content-type')||'';
    if (ct.includes('audio/wav')||ct.includes('audio')) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      resultEl.innerHTML = '<audio controls class="audio-player" src="'+url+'"></audio><br><a href="'+url+'" download="output.wav">Download WAV</a>';
    } else {
      const text = await r.text();
      try {
        const j = JSON.parse(text);
        if (j.audio) resultEl.innerHTML = '<audio controls class="audio-player" src="data:audio/wav;base64,'+j.audio+'"></audio>';
        else resultEl.innerHTML = '<pre style="white-space:pre-wrap;font-size:13px">'+JSON.stringify(j,null,2)+'</pre>';
      } catch { resultEl.innerHTML = '<pre>'+text+'</pre>'; }
    }
  } catch(e) { resultEl.innerHTML = 'Error: '+e; }
  btn.classList.remove('loading');
}

async function doTTS() {
  const text = document.getElementById('tts-text').value;
  if (!text) return;
  const body = {model:selectedModelId,input:text,language:document.getElementById('tts-lang').value||undefined};
  const seed = document.getElementById('tts-seed').value;
  if (seed && seed!=='-1') body.seed = parseInt(seed);
  const fi = document.getElementById('tts-voice-ref');
  if (fi.files.length>0) {
    const fd = new FormData(); fd.append('file',fi.files[0]);
    const ur = await fetch('/api/upload',{method:'POST',body:fd});
    const ud = await ur.json(); if (ud.path) body.voice_ref = ud.path;
  }
  const rt = document.getElementById('tts-ref-text').value;
  if (rt) body.reference_text = rt;
  await apiCall('/v1/audio/speech', body, 'tts-result');
}

async function doASR() {
  const fi = document.getElementById('asr-audio');
  if (!fi.files.length) return;
  const fd = new FormData(); fd.append('file',fi.files[0]);
  const ur = await fetch('/api/upload',{method:'POST',body:fd});
  const ud = await ur.json();
  const body = {model:selectedModelId,audio:ud.path};
  const lang = document.getElementById('asr-lang').value;
  if (lang) body.language = lang;
  const ctx = document.getElementById('asr-context').value;
  if (ctx) body.context = ctx;
  await apiCall('/v1/audio/transcriptions', body, 'asr-result');
}

async function doVC() {
  const s=document.getElementById('vc-source'),t=document.getElementById('vc-target');
  if (!s.files.length||!t.files.length) return;
  const fd=new FormData(); fd.append('source',s.files[0]); fd.append('target',t.files[0]);
  const ur=await fetch('/api/upload-multi',{method:'POST',body:fd});
  const paths=await ur.json();
  await apiCall('/v1/tasks/run',{model:selectedModelId,request:{audio:paths.source,voice_ref:paths.target}},'vc-result');
}

async function doGen() {
  const prompt=document.getElementById('gen-prompt').value;
  if (!prompt) return;
  await apiCall('/v1/tasks/run',{model:selectedModelId,request:{text:prompt,duration_seconds:parseInt(document.getElementById('gen-duration').value)||30}},'gen-result');
}

async function doSep() {
  const fi=document.getElementById('sep-audio');
  if (!fi.files.length) return;
  const fd=new FormData(); fd.append('file',fi.files[0]);
  const ur=await fetch('/api/upload',{method:'POST',body:fd});
  const ud=await ur.json();
  await apiCall('/v1/tasks/run',{model:selectedModelId,request:{audio:ud.path}},'sep-result');
}

async function doAnalyze() {
  const fi=document.getElementById('analyze-audio');
  if (!fi.files.length) return;
  const fd=new FormData(); fd.append('file',fi.files[0]);
  const ur=await fetch('/api/upload',{method:'POST',body:fd});
  const ud=await ur.json();
  const type=document.getElementById('analyze-type').value;
  const body={model:selectedModelId,request:{audio:ud.path}};
  if (type==='align') body.request.text=document.getElementById('align-text').value;
  await apiCall('/v1/tasks/run',body,'analyze-result');
}

async function doVdes() {
  const text=document.getElementById('vdes-text').value;
  const desc=document.getElementById('vdes-desc').value;
  if (!text||!desc) return;
  await apiCall('/v1/audio/speech',{model:selectedModelId,input:text,options:{caption:desc}},'vdes-result');
}

refreshStatus();
setInterval(refreshStatus,5000);
if (document.querySelector('.tab')) document.querySelector('.tab').classList.add('active');
</script>
</body>
</html>
