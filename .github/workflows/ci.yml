name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Format
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Race test
        run: go test -race -count=1 ./...

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Fix line endings
        shell: bash
        run: git config core.autocrlf false && git reset --hard HEAD

      - name: Format
        shell: bash
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build (no CGO)
        shell: bash
        run: go build $(go list ./... | grep -v -E '/storage|/runtime|/outputs|/jobs|/cmd/audiocpp-runtime')

      - name: Test (no CGO)
        shell: bash
        run: go test -count=1 $(go list ./... | grep -v -E '/storage|/runtime|/outputs|/jobs|/cmd/audiocpp-runtime')
